<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background: #f4f6f9; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background:white; padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:100%; max-width:400px; text-align:center;">

        <h2 style="margin-bottom:20px; color:#333;">Reverse String</h2>

        <input
            id="inputText"
            type="text"
            placeholder="Introduce un texto..."
            style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; margin-bottom:15px; font-size:16px;"
        />

        <button
            onclick="reverseString()"
            style="width:100%; padding:12px; background:#007BFF; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer;">
            Invertir texto
        </button>

        <div
            id="result"
            style="margin-top:20px; font-size:18px; color:#333; word-break:break-word;">
        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
